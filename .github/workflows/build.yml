name: Build Kariti Mod

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Java 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Download Forge MDK
        run: |
          curl -L "https://maven.minecraftforge.net/net/minecraftforge/forge/1.20.1-47.2.0/forge-1.20.1-47.2.0-mdk.zip" -o forge-mdk.zip
          unzip forge-mdk.zip -d forge-mdk

      - name: Find and copy mod files
        run: |
          echo "=== Files in repo ===" && ls -la
          JAVA_FILE=$(find . -name "KaritiMod.java" | head -1)
          echo "Found: $JAVA_FILE"
          SRC_ROOT=$(echo $JAVA_FILE | sed 's|/main/java/com/kariti/mod/KaritiMod.java||')
          BUILD_ROOT=$(echo $JAVA_FILE | sed 's|/src/main/java/com/kariti/mod/KaritiMod.java||')
          echo "SRC_ROOT=$SRC_ROOT  BUILD_ROOT=$BUILD_ROOT"
          rm -rf forge-mdk/src/main/java forge-mdk/src/main/resources
          cp -r "$SRC_ROOT/main/java" forge-mdk/src/main/
          cp -r "$SRC_ROOT/main/resources" forge-mdk/src/main/
          cp "$BUILD_ROOT/build.gradle" forge-mdk/
          cp "$BUILD_ROOT/gradle.properties" forge-mdk/
          cp "$BUILD_ROOT/settings.gradle" forge-mdk/
          echo "=== Result ===" && find forge-mdk/src -name "*.java" && cat forge-mdk/src/main/resources/META-INF/mods.toml

      - name: Make gradlew executable
        run: chmod +x forge-mdk/gradlew

      - name: Build mod
        run: |
          cd forge-mdk
          ./gradlew build --no-daemon

      - name: Upload JAR
        uses: actions/upload-artifact@v4
        with:
          name: kariti-mod-jar
          path: forge-mdk/build/libs/*.jar
          if-no-files-found: error
